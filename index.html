<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miraç Arda Seçkin | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #58a6ff; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; max-width: 600px; line-height: 1.6; }
        .btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #2ea44f; }
    </style>
</head>
<body>

    <h1>Hi, I'm Miraç Arda Seçkin! 👋</h1>
    <p>Software Engineering Student | Backend & AI Developer</p>
    <p>Welcome to my personal portfolio website. Under construction, but the celebration has already started!</p>
    
    <button class="btn" onclick="celebrate()">Celebrate! 🎉</button>

    <script>
        // Sayfa ilk açıldığında otomatik konfeti patlatır
        window.onload = function() {
            celebrate();
        };

        // Konfeti patlatma fonksiyonu
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
